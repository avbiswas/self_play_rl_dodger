behaviors:
  BulletMoveDuckDodger:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1000
      buffer_size: 8000
      learning_rate: 0.0002
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 15
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
      gail: 
        strength: 0.05
        demo_path: "../Demonstrations/Demo3_Duck"
    behavioral_cloning:
      strength: 0.01
      demo_path: "../Demonstrations/Demo3_Duck"
    keep_checkpoints: 5
    max_steps: 2000000
    time_horizon: 1000
    summary_freq: 20000
