behaviors:
  BulletShooter:
    trainer_type: ppo
    hyperparameters:
      batch_size: 256
      buffer_size: 5120
      learning_rate: 0.0002
      lambd: 0.93
      num_epoch: 4
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 512
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.96
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 3000000
    time_horizon: 256
    summary_freq: 20000
    self_play:
      window: 10
      play_against_latest_model_ratio: 0.5
      save_steps: 250000
      swap_steps: 5000
      team_change: 500000
