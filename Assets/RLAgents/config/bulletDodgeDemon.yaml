behaviors:
  BulletDodger:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1000
      buffer_size: 5000
      learning_rate: 0.0002
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 10
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 32
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    behavioral_cloning:
      strength: 0.5
      demo_path: "../Demonstrations/Demo1_Jump"
    keep_checkpoints: 5
    max_steps: 5000000
    time_horizon: 1000
    summary_freq: 30000
